version: 2

sources:
  - name: taxi_data
    description: "Raw NYC TLC Green Taxi trip data, loaded by ingestion/load_green_tripdata.py."
    schema: raw
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: loaded_at
    tables:
      - name: green_tripdata
        description: "One row per taxi trip, as published in the monthly TLC Parquet exports."
        columns:
          - name: vendor_id
            description: "Code of the TPEP provider that supplied the record."
          - name: lpep_pickup_datetime
            description: "Timestamp when the meter was engaged."
          - name: loaded_at
            description: "UTC timestamp set at ingestion time; drives source freshness."

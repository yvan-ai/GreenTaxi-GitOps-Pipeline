name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    # Simulate a database for dbt to connect during CI
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: greentaxi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated from v3 to fix Node.js 20 deprecation

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-core dbt-postgres 'sqlfluff==4.2.2' pandas pyarrow sqlalchemy

      - name: Lint SQL (SQLFluff)
        run: sqlfluff lint GreenTaxi/models --dialect postgres

      - name: Ingest NYC TLC sample data
        env:
          DB_HOST: localhost
          DB_USER: user
          DB_PASSWORD: pass
          DB_PORT: 5432
          DB_NAME: greentaxi
        run: python ingestion/load_green_tripdata.py 2021-01

      - name: Run dbt build (parse + freshness + run + test)
        env:
          DB_HOST: localhost
          DB_USER: user
          DB_PASSWORD: pass
          DB_PORT: 5432
          DB_NAME: greentaxi
        run: |
          cd GreenTaxi
          dbt parse --profiles-dir .
          dbt source freshness --profiles-dir .
          dbt build --profiles-dir .
          echo "✅ dbt models built and tested successfully."

  publish-dbt-docs:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: greentaxi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-core dbt-postgres pandas pyarrow sqlalchemy

      - name: Build models and generate docs
        env:
          DB_HOST: localhost
          DB_USER: user
          DB_PASSWORD: pass
          DB_PORT: 5432
          DB_NAME: greentaxi
        run: |
          python ingestion/load_green_tripdata.py 2021-01
          cd GreenTaxi
          dbt build --profiles-dir .
          dbt docs generate --profiles-dir . --static
          mkdir -p ../site
          cp target/static_index.html ../site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./GreenTaxi/Dockerfile
          push: true
          tags: |
            ghcr.io/yvan-ai/greentaxi-dbt:${{ github.sha }}
            ghcr.io/yvan-ai/greentaxi-dbt:latest

      - name: Update Kubernetes Manifests (GitOps)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          sed -i "s|image: ghcr.io/yvan-ai/greentaxi-dbt:.*|image: ghcr.io/yvan-ai/greentaxi-dbt:${{ github.sha }}|g" k8s/base/dbt-cronjob.yaml

          git add k8s/base/dbt-cronjob.yaml
          git commit -m "chore: bump dbt image to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push

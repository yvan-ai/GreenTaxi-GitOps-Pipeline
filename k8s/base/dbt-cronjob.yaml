apiVersion: batch/v1
kind: CronJob
metadata:
  name: greentaxi-dbt-run
spec:
  schedule: "0 0 * * *" # Every night at midnight
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: dbt
            image: ghcr.io/yvan-ai/greentaxi-dbt:5153a550da4321769b068cab5bf844d6125aa91d
            imagePullPolicy: Always
            env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "greentaxi"
          restartPolicy: OnFailure

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: greentaxi-dbt
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yvan-ai/GreenTaxi-GitOps-Pipeline' 
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
